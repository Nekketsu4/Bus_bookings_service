services:
  api:
    build: .
    container_name: booking_api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
#      rabbitmq:
#        condition: service_healthy
#      redis:
#        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - booking_net

  postgres:
    image: postgres:16-alpine
    container_name: booking_postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booking_user -d booking_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - booking_net

volumes:
  postgres_data:

networks:
  booking_net:
    driver: bridge